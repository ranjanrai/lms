<!DOCTYPE html>

<html lang="en">
<head>

<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- OVERLAY -->

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
<h2>LMS Admin</h2>

<a href="#" class="menu active"><i class="fas fa-home"></i> <span>Dashboard</span></a> <a href="#"><i class="fas fa-calendar-check"></i> <span>Leaves</span></a> <a href="#"><i class="fas fa-users"></i> <span>Employees</span></a> <a href="#"><i class="fas fa-cog"></i> <span>Settings</span></a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<h2>Dashboard</h2>

<div class="notif-bell">
<i class="fas fa-bell"></i>
<span class="notif-count">3</span>
</div>
</div>

<!-- SUMMARY -->

<div class="cards">

<div class="card">
<h3>Total Employees</h3>
<p id="totalEmployees">0</p>
</div>

<div class="card">
<h3>Total Leaves</h3>
<p id="totalLeaves">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingLeaves">0</p>
</div>

</div>

<!-- EMPLOYEES (CARD UI) -->

<h2 class="section-title">Employees</h2>
<div id="employeeList" class="card-list"></div>

<!-- LEAVE REQUESTS (CARD UI) -->

<h2 class="section-title">Leave Requests</h2>
<div id="leaveList" class="card-list"></div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
<a href="#"><i class="fas fa-home"></i></a>
<a href="#"><i class="fas fa-calendar"></i></a>
<a href="#"><i class="fas fa-users"></i></a>
<a href="#"><i class="fas fa-cog"></i></a>
</div>

<script src="js/firebase.js"></script>

<script src="js/admin.js"></script>

<script>
function toggleSidebar(){
const sidebar = document.getElementById("sidebar")
const overlay = document.getElementById("overlay")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
overlay.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}
}
</script>

</body>
</html>

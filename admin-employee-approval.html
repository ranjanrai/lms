<!DOCTYPE html>

<html lang="en">
<head>

<title>Employee Approval</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->

<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<!-- ACTIVE PAGE -->
<a href="admin-profile.html" class="menu active">
<i class="fas fa-user"></i> <span>Profile</span>
</a>

<a href="#" onclick="logout()" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<h2>Employee Approval</h2>
</div>

<!-- STATS CARDS -->

<div class="cards">

<div class="card fade-in">
<h3>Pending Employees</h3>
<p id="pendingCount">0</p>
</div>

<div class="card fade-in">
<h3>Approved Employees</h3>
<p id="approvedCount">0</p>
</div>

<div class="card fade-in">
<h3>Rejected Employees</h3>
<p id="rejectedCount">0</p>
</div>

</div>

<!-- TABLE -->

<h2 style="margin-top:20px;">Pending Employee Registrations</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>
</table>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

// =======================
// SIDEBAR TOGGLE
// =======================
function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}

}

// =======================
// ACTIVE MENU
// =======================
const links=document.querySelectorAll(".menu")
links.forEach(link=>{
link.addEventListener("click",function(){
links.forEach(l=>l.classList.remove("active"))
this.classList.add("active")
})
})

// =======================
// ADMIN CHECK
// =======================
auth.onAuthStateChanged(async function(user){

if(!user){
window.location.href="login.html"
return
}

const doc=await db.collection("users").doc(user.uid).get()

if(!doc.exists || doc.data().role!=="admin"){
alert("Access denied")
window.location.href="login.html"
return
}

loadEmployees()

})

// =======================
// LOAD EMPLOYEES
// =======================
function loadEmployees(){

const table=document.getElementById("employeeTable")

let pending=0, approved=0, rejected=0

db.collection("users").onSnapshot(snapshot=>{

table.innerHTML=""

snapshot.forEach(doc=>{

let data=doc.data()

if(data.role!=="employee") return

// COUNT
if(data.status==="pending") pending++
if(data.status==="approved") approved++
if(data.status==="rejected") rejected++

// SHOW ONLY PENDING
if(data.status!=="pending") return

let row=`
<tr class="fade-in">

<td>${data.name}</td>
<td>${data.email}</td>
<td><span style="color:orange;font-weight:bold;">Pending</span></td>

<td>
<button class="btn-approve" onclick="approveUser('${doc.id}')">
<i class="fas fa-check"></i>
</button>

<button class="btn-reject" onclick="rejectUser('${doc.id}')">
<i class="fas fa-times"></i>
</button>
</td>

</tr>
`

table.innerHTML+=row

})

// UPDATE CARDS
document.getElementById("pendingCount").innerText=pending
document.getElementById("approvedCount").innerText=approved
document.getElementById("rejectedCount").innerText=rejected

})

}

// =======================
// APPROVE
// =======================
async function approveUser(uid){

    if(!confirm("Approve this employee?")) return

    try{

        // ?? 1. Get leave types
        const leaveTypesSnapshot = await db.collection("leave_types").get()

        let leaveBalance = {}

        leaveTypesSnapshot.forEach(doc=>{
            let d = doc.data()
            leaveBalance[d.name] = parseInt(d.max_days) || 0
        })

        // ?? 2. Update employee
        await db.collection("users").doc(uid).update({
            status: "approved",
            probation: true,
            leave_balance: leaveBalance
        })

        // ?? 3. Notification
        await db.collection("notifications").add({
            userId: uid,
            role: "employee",
            type: "account_approved",
            message: "?? Your account has been approved. You can now apply for leave.",
            read: false,
            hidden: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })

        alert("? Employee approved successfully")

    }catch(error){
        console.error(error)
        alert("? Error approving employee")
    }
}

// =======================
// REJECT
// =======================
function rejectUser(uid){

db.collection("users").doc(uid).update({
status:"rejected"
}).then(()=>{
alert("Employee rejected")
})

}

</script>

</body>
</html>

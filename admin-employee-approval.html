
<!DOCTYPE html>
<html>
<head>

<title>Employee Approval</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
margin:0;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#2d7ef7;
height:100vh;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:10px;
}

.sidebar a:hover{
background:#1b5edb;
}

/* MAIN */

.main{
flex:1;
padding:20px;
background:#f4f6f9;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

button{
padding:6px 10px;
border:none;
cursor:pointer;
color:white;
}

.approve{
background:green;
}

.reject{
background:red;
}

.logout{
background:#e74c3c;
margin-top:20px;
width:100%;
}

</style>

</head>

<body>


<!-- MOBILE HEADER -->
<div class="mobile-header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<h2 class="mobile-title">Leave System</h2>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Admin Panel</h2>

<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-leave-requests.html">Leave Requests</a>
<a href="admin-employee-approval.html">Employee Approval</a>
<a href="leave-types.html">Leave type</a>
<a href="leave-settings.html">Leave Settings</a>
<a href="holidays.html">Holidays</a>
<a href="index.html">Logout</a>

</div>



<!-- MAIN -->

<div class="main">

<h1>Employee Approval</h1>

<h3>Pending Employee Registrations</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>

<script>

// check admin login
auth.onAuthStateChanged(async function(user){

if(!user){
window.location.href="login.html";
return;
}

const doc = await db.collection("users").doc(user.uid).get();

if(!doc.exists || doc.data().role !== "admin"){
alert("Access denied");
window.location.href="login.html";
}

});


// load pending employees
const tableBody = document.getElementById("employeeTable");

db.collection("users")
.where("status","==","pending")
.onSnapshot(snapshot=>{

tableBody.innerHTML="";

snapshot.forEach(doc=>{

const data = doc.data();

const row = `
<tr>
<td>${data.name}</td>
<td>${data.email}</td>
<td>${data.status}</td>

<td>
<button class="approve" onclick="approveUser('${doc.id}')">Approve</button>
<button class="reject" onclick="rejectUser('${doc.id}')">Reject</button>
</td>

</tr>
`;

tableBody.innerHTML += row;

});

});


// approve employee
function approveUser(uid){

db.collection("users").doc(uid).update({
status:"approved"
}).then(()=>{

alert("Employee approved");

});

}


// reject employee
function rejectUser(uid){

db.collection("users").doc(uid).update({
status:"rejected"
}).then(()=>{

alert("Employee rejected");

});

}


// logout
function logout(){

auth.signOut().then(()=>{
window.location.href="login.html";
});

}
function toggleMenu(){

let sidebar = document.getElementById("sidebar")

sidebar.classList.toggle("show")

}

</script>

</body>
</html>

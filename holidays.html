<!DOCTYPE html>

<html lang="en">
<head>

<title>Holiday Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN CSS -->

<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu active">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<a href="index.html" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<h2>Holiday Management</h2>
</div>

<!-- ADD HOLIDAY -->

<div class="card fade-in">

<h3>Add Holiday</h3>

<div class="form-row">

<input type="text" id="holidayName" placeholder="Holiday Name">

<input type="date" id="holidayDate">

</div>

<textarea id="holidayDescription" placeholder="Description"></textarea>

<button class="btn-primary" onclick="addHoliday()">
<i class="fas fa-plus"></i> Add Holiday
</button>

</div>

<!-- HOLIDAY LIST -->

<div class="card fade-in" style="margin-top:20px;">

<h3 style="margin-bottom:10px;">Holiday List</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody id="holidayTable"></tbody>
</table>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

// =======================
// AUTH CHECK (IMPORTANT)
// =======================
auth.onAuthStateChanged(async (user) => {

if (!user) {
  window.location.href = "login.html"
  return
}

const doc = await db.collection("users").doc(user.uid).get()

if (!doc.exists || doc.data().role !== "admin") {
  alert("Access denied")
  window.location.href = "login.html"
  return
}

// Load holidays after auth
loadHolidays()

})


// =======================
// SIDEBAR TOGGLE
// =======================
function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}

}


// =======================
// ADD HOLIDAY (FIXED)
// =======================
async function addHoliday(){

let name = document.getElementById("holidayName").value.trim()
let date = document.getElementById("holidayDate").value
let description = document.getElementById("holidayDescription").value.trim()

if (!name || !date) {
  alert("Please fill required fields")
  return
}

try {

await db.collection("holidays").add({
  holiday_name: name,
  holiday_date: date,
  description: description || "",
  createdAt: firebase.firestore.FieldValue.serverTimestamp()
})

alert("Holiday Added Successfully")

// ✅ Reset form
document.getElementById("holidayName").value = ""
document.getElementById("holidayDate").value = ""
document.getElementById("holidayDescription").value = ""

} catch (error) {

console.error(error)
alert("Error: " + error.message)

}

}


// =======================
// LOAD HOLIDAYS (IMPROVED)
// =======================
function loadHolidays(){

db.collection("holidays")
.orderBy("holiday_date")
.onSnapshot(snapshot=>{

let html=""

if(snapshot.empty){
html = `<tr><td colspan="4">No holidays found</td></tr>`
}else{

snapshot.forEach(doc=>{

let d = doc.data()

html += `
<tr class="fade-in">

<td>${d.holiday_name || "-"}</td>
<td>${d.holiday_date || "-"}</td>
<td>${d.description || "-"}</td>

<td>
<button class="btn-reject" onclick="deleteHoliday('${doc.id}')">
<i class="fas fa-trash"></i>
</button>
</td>

</tr>
`

})

}

document.getElementById("holidayTable").innerHTML = html

})

}


// =======================
// DELETE HOLIDAY (SAFE)
// =======================
async function deleteHoliday(id){

if (!confirm("Delete this holiday?")) return

try {

await db.collection("holidays").doc(id).delete()
alert("Deleted successfully")

} catch (error) {

console.error(error)
alert("Error deleting holiday")

}

}

</script>

</body>
</html>

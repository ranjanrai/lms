<!DOCTYPE html>

<html lang="en">
<head>

<title>Leave Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN CSS -->

<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<!-- ACTIVE PAGE -->
<a href="admin-profile.html" class="menu active">
<i class="fas fa-user"></i> <span>Profile</span>
</a>

<a href="#" onclick="logout()" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<h2>Leave Settings</h2>
</div>

<!-- CURRENT SETTINGS -->

<div class="card fade-in">
<label>Carry Forward Mode</label>
<select id="carryMode">
  <option value="manual">Manual</option>
  <option value="auto">Automatic</option>
</select>
<h3>Current Leave Cycle</h3>

<table>
<thead>
<tr>
<th>Start Month</th>
<th>Start Year</th>
<th>End Month</th>
<th>End Year</th>

</tr>
</thead>

<tbody id="leaveSettingsTable">
<tr>
<td colspan="6" style="text-align:center;">No settings found</td>
</tr>
</tbody>
</table>

</div>

<!-- FORM -->

<div class="card fade-in" style="margin-top:20px;">

<h3>Update Leave Settings</h3>

<label>Start Month</label> <select id="startMonth">

<option value="1">January</option>
<option value="2">February</option>
<option value="3">March</option>
<option value="4">April</option>
<option value="5">May</option>
<option value="6">June</option>
<option value="7">July</option>
<option value="8">August</option>
<option value="9">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>
</select>

<label>Start Year</label> <input type="number" id="startYear">

<label>End Month</label> <select id="endMonth">

<option value="1">January</option>
<option value="2">February</option>
<option value="3">March</option>
<option value="4">April</option>
<option value="5">May</option>
<option value="6">June</option>
<option value="7">July</option>
<option value="8">August</option>
<option value="9">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>
</select>

<label>End Year</label> <input type="number" id="endYear">



<button onclick="saveLeaveSettings()">Save Settings</button>

<div id="successMsg" style="
display:none;
margin-top:15px;
padding:10px;
background:#d4edda;
color:#155724;
border-radius:8px;
">
Settings saved successfully
</div>

</div>

<div class="card" style="margin-top:20px;">

<h3>📋 Leave Instructions Settings</h3>

<input type="text" id="leaveName" placeholder="Leave Name (e.g. Casual Leave)">
<input type="text" id="leaveCode" placeholder="Code (CL, EL, SL)">
<input type="text" id="leaveDays" placeholder="Days per year">

<textarea id="leaveRules" placeholder="Enter full rules..."></textarea>

<button onclick="saveLeaveInstruction()">Save Instruction</button>

<hr>

<div id="leaveList"></div>

</div>



</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/leave-settings.js"></script>
<script src="js/carry-forward.js"></script>


<script>

// SIDEBAR TOGGLE (FIXED)
function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Leave History</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* PAGE */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
background:#f4f6f9;
}

/* MOBILE HEADER */

.mobile-header{
display:none;
background:#2d7ef7;
color:white;
padding:15px;
align-items:center;
}

.menu-btn{
font-size:22px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.mobile-header h2{
flex:1;
text-align:center;
margin:0;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#2d7ef7;
height:100vh;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
margin-bottom:10px;
border-radius:6px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* TABLE CARD */

.table-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

th{
background:#f4f4f4;
}

/* BUTTON */

button{
padding:6px 10px;
background:#ff4d4d;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

/* STATUS COLORS */

.status-pending{
color:orange;
font-weight:bold;
}

.status-approved{
color:green;
font-weight:bold;
}

.status-rejected{
color:red;
font-weight:bold;
}

.status-cancelled{
color:gray;
font-weight:bold;
}

/* MOBILE */

@media (max-width:768px){

body{
flex-direction:column;
}

.mobile-header{
display:flex;
}

.sidebar{
position:fixed;
left:-240px;
top:0;
height:100%;
transition:0.3s;
}

.sidebar.show{
left:0;
}

.main{
padding:20px;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

</style>

</head>

<body>

<!-- MOBILE HEADER -->

<div class="mobile-header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<h2>Employee Panel</h2>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Employee</h2>

<a href="employee-dashboard.html">Dashboard</a>
<a href="apply-leave.html">Apply Leave</a>
<a href="#">Leave History</a>

</div>

<!-- MAIN -->

<div class="main">

<h1>Leave History</h1>

<div class="table-card">

<table>

<thead>

<tr>
<th>Leave Type</th>
<th>Start Date</th>
<th>End Date</th>
<th>Days</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="leaveTable"></tbody>

</table>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/leave-history.js"></script>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("show")
}

</script>

</body>
</html>

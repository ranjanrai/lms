<!DOCTYPE html>
<html>

<head>

<title>Leave History</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

button{
padding:6px 10px;
background:#ff4d4d;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

.back{
margin-top:20px;
display:block;
text-align:center;
text-decoration:none;
color:#2d7ef7;
}

/* STATUS COLORS */

.status-pending{
color:orange;
font-weight:bold;
}

.status-approved{
color:green;
font-weight:bold;
}

.status-rejected{
color:red;
font-weight:bold;
}

.status-cancelled{
color:gray;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Leave History</h2>

<table>

<thead>

<tr>
<th>Leave Type</th>
<th>Start Date</th>
<th>End Date</th>
<th>Days</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="leaveTable"></tbody>

</table>

<a class="back" href="employee-dashboard.html">
← Back to Dashboard
</a>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/leave-history.js"></script>

</body>
</html>

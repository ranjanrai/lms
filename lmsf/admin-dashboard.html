<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
margin:0;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#2d7ef7;
height:100vh;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:10px;
}

.sidebar a:hover{
background:#1b5edb;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#f4f4f4;
padding:20px;
border-radius:5px;
width:200px;
text-align:center;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#f0f0f0;
}

button{
padding:6px 10px;
border:none;
background:#2d7ef7;
color:white;
cursor:pointer;
}

button:hover{
background:#1b5edb;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Admin</h2>

<a href="#">Dashboard</a>
<a href="#employees">Employees</a>
<a href="#leave">Leave Requests</a>
<a href="#holidays">Holidays</a>

<button onclick="logout()">Logout</button>

</div>



<!-- MAIN CONTENT -->

<div class="main">

<h1>Admin Dashboard</h1>


<!-- DASHBOARD CARDS -->

<div class="cards">

<div class="card">
<h3>Total Employees</h3>
<p id="totalEmployees">0</p>
</div>

<div class="card">
<h3>Total Leaves</h3>
<p id="totalLeaves">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingLeaves">0</p>
</div>

</div>



<!-- EMPLOYEES -->

<h2 id="employees">Employees</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="employeeTable"></tbody>

</table>



<!-- LEAVE REQUESTS -->

<h2 id="leave">Leave Requests</h2>

<table>

<thead>

<tr>
<th>User</th>
<th>Leave</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="leaveRequests"></tbody>

</table>


</div>



<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/admin.js"></script>

</body>

</html>

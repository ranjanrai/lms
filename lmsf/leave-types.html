<!DOCTYPE html>
<html>

<head>

<title>Leave Types</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 20px;
background:#2d7ef7;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5edb;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

.delete{
background:red;
}

.back{
margin-top:20px;
display:block;
text-align:center;
text-decoration:none;
color:#2d7ef7;
}

</style>

</head>

<body>

<div class="container">

<h2>Leave Type Management</h2>

<!-- ADD LEAVE TYPE -->

<h3>Add Leave Type</h3>

<input type="text" id="leaveName" placeholder="Leave Name">

<input type="number" id="maxDays" placeholder="Maximum Days">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addLeaveType()">Add Leave Type</button>


<!-- LEAVE TYPES TABLE -->

<h3>Leave Types List</h3>

<table>

<thead>

<tr>
<th>Leave Name</th>
<th>Max Days</th>
<th>Description</th>
<th>Action</th>
</tr>

</thead>

<tbody id="leaveTypeTable"></tbody>

</table>

<a class="back" href="admin-dashboard.html">
← Back to Dashboard
</a>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>


<script>

// ADD LEAVE TYPE

function addLeaveType(){

let name=document.getElementById("leaveName").value
let days=document.getElementById("maxDays").value
let description=document.getElementById("description").value

db.collection("leave_types").add({

name:name,
max_days:days,
description:description

})

.then(()=>{

alert("Leave Type Added")

loadLeaveTypes()

})

}



// LOAD LEAVE TYPES

function loadLeaveTypes(){

db.collection("leave_types")
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let d=doc.data()

html+=`

<tr>

<td>${d.name}</td>
<td>${d.max_days}</td>
<td>${d.description}</td>

<td>

<button class="delete" onclick="deleteLeaveType('${doc.id}')">
Delete
</button>

</td>

</tr>

`

})

document.getElementById("leaveTypeTable").innerHTML=html

})

}



// DELETE LEAVE TYPE

function deleteLeaveType(id){

db.collection("leave_types")
.doc(id)
.delete()

}



// AUTO LOAD

loadLeaveTypes()

</script>

</body>

</html>

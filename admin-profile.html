<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Admin Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<!-- ACTIVE PAGE -->
<a href="admin-profile.html" class="menu active">
<i class="fas fa-user"></i> <span>Profile</span>
</a>

<a href="#" onclick="logout()" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">

<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<h2>Admin Profile</h2>

</div>

<!-- PROFILE CARD -->
<div class="section">

<div class="card" style="max-width:500px;margin:auto;">

<h3>Profile Details</h3>

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<button onclick="updateProfile()">Update Profile</button>

<hr>

<h3>Reset Password</h3>

<input type="password" id="newPassword" placeholder="Enter new password">

<button onclick="resetPassword()">Update Password</button>

<hr>

<h3>Email Notification</h3>

<label>
<input type="checkbox" id="emailToggle">
 Enable Email Notification
</label>

<hr>

<h3>Notification Email</h3>

<input type="email" id="notifyEmail" placeholder="Enter email for notifications">

<button onclick="saveNotificationEmail()">Save Notification Email</button>
</div>

</div>

</div>
<div id="passwordModal" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:1000;
">

<div style="
background:#fff;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
">

<h3>🔐 Verify Password</h3>

<input type="password" id="confirmPassword" placeholder="Enter current password"
style="width:100%;padding:10px;margin:10px 0;">

<button onclick="confirmUpdate()" style="width:100%;">Confirm</button>
<button onclick="closeModal()" style="width:100%;margin-top:10px;background:red;">Cancel</button>

</div>
</div>
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>

<script>

// Load user data
firebase.auth().onAuthStateChanged(async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    // 🔥 Always get latest auth data
    document.getElementById("email").value = user.email || "";

    const doc = await db.collection("users").doc(user.uid).get();
    const data = doc.data() || {};

    // ✅ Name from Firestore
    document.getElementById("name").value = data.name || "Admin";

    // ✅ Notification settings
    document.getElementById("emailToggle").checked = data.emailNotification || false;
    document.getElementById("notifyEmail").value = data.notifyEmail || user.email;
});


let newEmailGlobal = "";

function updateProfile() {

    const user = firebase.auth().currentUser;

    if (!user) {
        alert("User not logged in");
        return;
    }

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    // ✅ Validation
    if (!name || !email) {
        alert("Please fill all fields");
        return;
    }

    // ✅ Update name immediately
    db.collection("users").doc(user.uid).update({
        name: name
    });

    // ✅ If email not changed → no need for password
    if (email === user.email) {
        alert("✅ Profile updated successfully");
        return;
    }

    // ✅ Store new email globally for confirmUpdate()
    newEmailGlobal = email;

    // ✅ Open password modal
    document.getElementById("passwordModal").style.display = "flex";
}
function confirmUpdate() {

    const user = firebase.auth().currentUser;
    const password = document.getElementById("confirmPassword").value;

    if (!password) {
        alert("Enter password");
        return;
    }

    const credential = firebase.auth.EmailAuthProvider.credential(
        user.email,
        password
    );

    user.reauthenticateWithCredential(credential)
    .then(() => {
        // ✅ VERIFY BEFORE UPDATE
        return user.verifyBeforeUpdateEmail(newEmailGlobal);
    })
    .then(() => {
        alert("📧 Verification email sent to new email. Please verify first.");
        closeModal();
    })
    .catch(err => {

        if (err.code === "auth/wrong-password") {
            alert("❌ Wrong password");
        }
        else if (err.code === "auth/invalid-email") {
            alert("❌ Invalid email format");
        }
        else if (err.code === "auth/email-already-in-use") {
            alert("⚠ Email already in use");
        }
        else if (err.code === "auth/too-many-requests") {
            alert("⚠ Too many attempts. Try later");
        }
        else {
            alert(err.message);
        }

    });
}
// Reset Password
function resetPassword() {

    const user = firebase.auth().currentUser;
    const pass = document.getElementById("newPassword").value;

    if(pass.length < 6){
        alert("Minimum 6 characters required");
        return;
    }

    user.updatePassword(pass)
    .then(() => alert("Password Updated"))
    .catch(err => {

    if (err.code === "auth/weak-password") {
        alert("⚠ Password should be at least 6 characters.");
    }
    else {
        alert(err.message);
    }

});
}


// Email Toggle
document.getElementById("emailToggle").addEventListener("change", async function () {

    const user = firebase.auth().currentUser;

    await db.collection("users").doc(user.uid).update({
        emailNotification: this.checked
    });

    alert("Notification Updated");
});
function closeModal() {
    document.getElementById("passwordModal").style.display = "none";
    document.getElementById("confirmPassword").value = "";
}

// Logout
function logout() {
    firebase.auth().signOut()
    .then(() => window.location.href = "login.html");
}

function saveNotificationEmail() {

    const user = firebase.auth().currentUser;
    const email = document.getElementById("notifyEmail").value.trim();

    if (!email) {
        alert("Enter email");
        return;
    }

    db.collection("users").doc(user.uid).update({
        notifyEmail: email
    })
    .then(() => {
        alert("✅ Notification email saved");
    })
    .catch(err => alert(err.message));
}
// Sidebar Toggle
function toggleSidebar(){

const sidebar = document.getElementById("sidebar");

if(window.innerWidth <= 768){
    sidebar.classList.toggle("active");
}else{
    sidebar.classList.toggle("collapsed");
}

}


// Active menu
const links = document.querySelectorAll(".menu");

links.forEach(link => {
link.addEventListener("click", function () {
    links.forEach(l => l.classList.remove("active"));
    this.classList.add("active");
});
});

</script>

</body>
</html>

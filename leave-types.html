<!DOCTYPE html>

<html lang="en">
<head>

<title>Leave Types</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN CSS -->

<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu active">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<a href="index.html" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<h2>Leave Types</h2>
</div>

<!-- ADD FORM -->

<div class="card fade-in">

<h3>Add / Update Leave Type</h3>

<input type="text" id="leaveName" placeholder="Leave Name">

<input type="number" id="maxDays" placeholder="Maximum Days">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addLeaveType()">Save</button>

</div>

<!-- TABLE -->

<div class="card fade-in" style="margin-top:20px;">

<h3>Leave Types List</h3>

<table>
<thead>
<tr>
<th>Leave Name</th>
<th>Max Days</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody id="leaveTypeTable"></tbody>
</table>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

// ============================
// SIDEBAR TOGGLE
// ============================
function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}

}

// ============================
// ADD / UPDATE
// ============================
let editId=null

function addLeaveType(){

let name=document.getElementById("leaveName").value
let days=document.getElementById("maxDays").value
let description=document.getElementById("description").value

if(name=="" || days==""){
alert("Please fill required fields")
return
}

if(editId){

db.collection("leave_types").doc(editId).update({
name:name,
max_days:days,
description:description
}).then(()=>{
alert("Updated")
editId=null
clearForm()
})

}else{

db.collection("leave_types").add({
name:name,
max_days:days,
description:description
}).then(()=>{
alert("Added")
clearForm()
})

}

}

// ============================
// LOAD
// ============================
function loadLeaveTypes(){

db.collection("leave_types")
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let d=doc.data()

html+=`
<tr class="fade-in">

<td>${d.name}</td>
<td>${d.max_days}</td>
<td>${d.description}</td>

<td>
<button onclick="editLeaveType('${doc.id}','${d.name}','${d.max_days}','${d.description}')">
<i class="fas fa-edit"></i>
</button>

<button class="btn-reject" onclick="deleteLeaveType('${doc.id}')">
<i class="fas fa-trash"></i>
</button>
</td>

</tr>
`

})

document.getElementById("leaveTypeTable").innerHTML=html

})

}

// ============================
// EDIT
// ============================
function editLeaveType(id,name,days,description){

editId=id

document.getElementById("leaveName").value=name
document.getElementById("maxDays").value=days
document.getElementById("description").value=description

window.scrollTo(0,0)

}

// ============================
// DELETE
// ============================
function deleteLeaveType(id){

if(confirm("Delete this leave type?")){
db.collection("leave_types").doc(id).delete()
}

}

// ============================
function clearForm(){
document.getElementById("leaveName").value=""
document.getElementById("maxDays").value=""
document.getElementById("description").value=""
}

// AUTO LOAD
loadLeaveTypes()

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Leave Types</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 20px;
background:#2d7ef7;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5edb;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#f0f0f0;
}

.delete{
background:red;
}

.back{
margin-top:20px;
display:block;
text-align:center;
text-decoration:none;
color:#2d7ef7;
}

</style>

</head>

<body>
<!-- SIDEBAR -->

<!-- MOBILE HEADER -->
<div class="mobile-header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<h2 class="mobile-title">Leave System</h2>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Admin Panel</h2>

<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-leave-requests.html">Leave Requests</a>
<a href="admin-employee-approval.html">Employee Approval</a>
<a href="leave-types.html">Leave type</a>
<a href="leave-settings.html">Leave Settings</a>
<a href="holidays.html">Holidays</a>
<a href="index.html">Logout</a>

</div>
<div class="container">

<h2>Leave Type Management</h2>

<!-- ADD LEAVE TYPE -->

<h3>Add Leave Type</h3>

<input type="text" id="leaveName" placeholder="Leave Name">

<input type="number" id="maxDays" placeholder="Maximum Days">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addLeaveType()">Add Leave Type</button>


<!-- LEAVE TYPES TABLE -->

<h3>Leave Types List</h3>

<table>

<thead>

<tr>
<th>Leave Name</th>
<th>Max Days</th>
<th>Description</th>
<th>Action</th>
</tr>

</thead>

<tbody id="leaveTypeTable"></tbody>

</table>

<a class="back" href="admin-dashboard.html">
← Back to Dashboard
</a>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>


<script>

let editId = null

// ============================
// ADD OR UPDATE LEAVE TYPE
// ============================

function addLeaveType(){

let name = document.getElementById("leaveName").value
let days = document.getElementById("maxDays").value
let description = document.getElementById("description").value

if(name=="" || days==""){
alert("Please fill required fields")
return
}

// UPDATE MODE
if(editId){

db.collection("leave_types")
.doc(editId)
.update({

name:name,
max_days:days,
description:description

})

.then(()=>{

alert("Leave Type Updated")

editId = null

clearForm()

})

}

// ADD MODE
else{

db.collection("leave_types").add({

name:name,
max_days:days,
description:description

})

.then(()=>{

alert("Leave Type Added")

clearForm()

})

}

}



// ============================
// LOAD LEAVE TYPES
// ============================

function loadLeaveTypes(){

db.collection("leave_types")
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let d = doc.data()

html += `

<tr>

<td>${d.name}</td>
<td>${d.max_days}</td>
<td>${d.description}</td>

<td>

<button onclick="editLeaveType('${doc.id}','${d.name}','${d.max_days}','${d.description}')">
Edit
</button>

<button class="delete" onclick="deleteLeaveType('${doc.id}')">
Delete
</button>

</td>

</tr>

`

})

document.getElementById("leaveTypeTable").innerHTML = html

})

}



// ============================
// EDIT LEAVE TYPE
// ============================

function editLeaveType(id,name,days,description){

editId = id

document.getElementById("leaveName").value = name
document.getElementById("maxDays").value = days
document.getElementById("description").value = description

window.scrollTo(0,0)

}



// ============================
// DELETE LEAVE TYPE
// ============================

function deleteLeaveType(id){

if(confirm("Delete this leave type?")){

db.collection("leave_types")
.doc(id)
.delete()

}

}



// ============================
// CLEAR FORM
// ============================

function clearForm(){

document.getElementById("leaveName").value = ""
document.getElementById("maxDays").value = ""
document.getElementById("description").value = ""

}



// ============================
// AUTO LOAD
// ============================

loadLeaveTypes()



// ============================
// MOBILE SIDEBAR TOGGLE
// ============================

function toggleMenu(){

let sidebar = document.getElementById("sidebar")

sidebar.classList.toggle("show")

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<title>Leave Types</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>LMS Admin</h2>

<a href="admin-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="admin-leave-requests.html" class="menu">
<i class="fas fa-calendar-check"></i> <span>Leave Requests</span>
</a>

<a href="admin-employee-approval.html" class="menu">
<i class="fas fa-user-check"></i> <span>Employee Approval</span>
</a>

<a href="leave-types.html" class="menu">
<i class="fas fa-list"></i> <span>Leave Types</span>
</a>

<a href="leave-settings.html" class="menu">
<i class="fas fa-cog"></i> <span>Settings</span>
</a>

<a href="holidays.html" class="menu">
<i class="fas fa-calendar"></i> <span>Holidays</span>
</a>

<!-- ACTIVE PAGE -->
<a href="admin-profile.html" class="menu active">
<i class="fas fa-user"></i> <span>Profile</span>
</a>

<a href="#" onclick="logout()" class="menu">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<button onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<h2>Leave Types</h2>
</div>

<!-- DEFAULT BUTTON -->
<div style="margin-bottom:15px;">
<button onclick="addDefaultLeaveTypes()">Add 7 Default Leave Types</button>
</div>

<!-- ADD FORM -->
<div class="card fade-in">

<h3>Add / Update Leave Type</h3>

<input type="text" id="leaveName" placeholder="Leave Name">
<input type="number" id="maxDays" placeholder="Maximum Days">
<textarea id="description" placeholder="Description"></textarea>

<button onclick="addLeaveType()">Save</button>

</div>

<!-- TABLE -->
<div class="card fade-in" style="margin-top:20px;">

<h3>Leave Types List</h3>

<table>
<thead>
<tr>
<th>Code</th>
<th>Leave Name</th>
<th>Max Days</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody id="leaveTypeTable"></tbody>
</table>

</div>
<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000080;">

<div style="background:#fff; padding:20px; width:400px; margin:80px auto; border-radius:10px;">

<h3>Leave Settings</h3>

<label>Monthly Limit</label>
<input type="number" id="monthlyLimit"
<label>Probation Limit (Days)</label>
<input type="number" id="probationLimit" placeholder="0 = Not allowed">
<select id="monthlyEnabled">

<option value="true">Enabled</option>
<option value="false">Disabled</option>
</select>

<label>Carry Forward</label>
<select id="carryForward">
<option value="true">Yes</option>
<option value="false">No</option>
</select>
<label>Carry Remaining (Full Balance)</label>
<select id="carryRemaining">
  <option value="true">Yes</option>
  <option value="false">No</option>
</select>
<input type="number" id="carryForwardMax" placeholder="Max Days">
<!-- ✅ ADD THIS HERE -->
<label>Carry Type</label>
<select id="carryType">
  <option value="yearly">Yearly</option>
  <option value="monthly">Monthly</option>
</select>

<label>After 1 Year Only</label>
<select id="after1YearOnly">
<option value="true">Enabled</option>
<option value="false">Disabled</option>
</select>
<input type="number" id="after1YearDays" placeholder="Days">

<label>Apply Before (Days)</label>
<input type="number" id="advanceDays">
<select id="advanceEnabled">
<option value="true">Enabled</option>
<option value="false">Disabled</option>
</select>

<br><br>

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>

</div>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<script>

// ============================
// SIDEBAR TOGGLE
// ============================
function toggleSidebar(){
const sidebar=document.getElementById("sidebar")
if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}
}
// ACTIVE MENU FIX
const links = document.querySelectorAll(".menu");

links.forEach(link => {
link.addEventListener("click", function () {
links.forEach(l => l.classList.remove("active"));
this.classList.add("active");
});
});

// ============================
// ADD DEFAULT 7 LEAVE TYPES
// ============================
function addDefaultLeaveTypes(){

const leaveTypes = [
  {code:"CL", name:"Casual Leave", max_days:12, description:"Personal/emergency"},
  {code:"EL", name:"Earned Leave", max_days:10, description:"After 1 year"},
  {code:"SL", name:"Sick Leave", max_days:12, description:"Medical"},
  {code:"DL", name:"Duty Leave", max_days:30, description:"Academic"},
  {code:"ML", name:"Maternity Leave", max_days:182, description:"Female staff"},
  {code:"PL", name:"Paternity Leave", max_days:15, description:"Male staff"},
  {code:"SPL", name:"Special Leave", max_days:0, description:"Exam duty"}
];

leaveTypes.forEach((leave)=>{

db.collection("leave_types")
.doc(leave.code)
.set({
...leave,

settings:{
  monthlyLimit:0,
  monthlyEnabled:false,
  carryForward:false,
  carryRemaining:false,
  carryForwardMax:0,
  carryType: "yearly",
  after1YearOnly:false,
  after1YearDays:0,
  advanceDays:0,
  advanceEnabled:false,
  probationLimit: 0   // ✅ ADD
}

});

});

alert("✅ 7 Leave Types Added!");

}

// ============================
// ADD / UPDATE
// ============================
let editId=null

function addLeaveType(){

let name=document.getElementById("leaveName").value
let days=document.getElementById("maxDays").value
let description=document.getElementById("description").value

if(name=="" || days==""){
alert("Please fill required fields")
return
}

// auto code
let code = name.split(" ").map(w=>w[0]).join("").toUpperCase()

if(editId){

db.collection("leave_types").doc(editId).update({
name:name,
max_days:days,
description:description,
code:code
}).then(()=>{
alert("Updated")
editId=null
clearForm()
})

}else{

db.collection("leave_types").add({
name:name,
max_days:days,
description:description,
code:code,

settings:{
  monthlyLimit:0,
  monthlyEnabled:false,
  carryForward:false,
  carryForwardMax:0,
  after1YearOnly:false,
  after1YearDays:0,
  advanceDays:0,
  advanceEnabled:false,
  probationLimit: 0   // ✅ ADD

}

})

}

}

// ============================
// LOAD
// ============================
function loadLeaveTypes(){

db.collection("leave_types")
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let d=doc.data()

html+=`
<tr class="fade-in">

<td>${d.code || "-"}</td>
<td>${d.name}</td>
<td>${d.max_days}</td>
<td>${d.description}</td>

<td>

<button onclick="openSettings('${doc.id}')">
<i class="fas fa-cog"></i>
</button>

<button onclick="editLeaveType('${doc.id}','${d.name}','${d.max_days}','${d.description}')">
<i class="fas fa-edit"></i>
</button>

<button class="btn-reject" onclick="deleteLeaveType('${doc.id}')">
<i class="fas fa-trash"></i>
</button>

</td>

</tr>
`

})

document.getElementById("leaveTypeTable").innerHTML=html

})

}

// ============================
// EDIT
// ============================
function editLeaveType(id,name,days,description){

editId=id

document.getElementById("leaveName").value=name
document.getElementById("maxDays").value=days
document.getElementById("description").value=description

window.scrollTo(0,0)

}

// ============================
// DELETE
// ============================
function deleteLeaveType(id){

if(confirm("Delete this leave type?")){
db.collection("leave_types").doc(id).delete()
}

}

// ============================
function clearForm(){
document.getElementById("leaveName").value=""
document.getElementById("maxDays").value=""
document.getElementById("description").value=""
}

// AUTO LOAD
loadLeaveTypes()

let currentLeaveId = null;

// OPEN SETTINGS
function openSettings(id){

currentLeaveId = id;

db.collection("leave_types").doc(id).get().then(doc=>{

let s = doc.data().settings || {};

document.getElementById("monthlyLimit").value = s.monthlyLimit || 0;
document.getElementById("probationLimit").value = s.probationLimit || 0;
document.getElementById("monthlyEnabled").value = (s.monthlyEnabled ?? false).toString();

document.getElementById("carryForward").value = (s.carryForward ?? false).toString();
document.getElementById("carryRemaining").value = (s.carryRemaining ?? false).toString();
document.getElementById("carryType").value = s.carryType || "yearly";
document.getElementById("carryForwardMax").value = s.carryForwardMax || 0;

document.getElementById("after1YearOnly").value = (s.after1YearOnly ?? false).toString();
document.getElementById("after1YearDays").value = s.after1YearDays || 0;

document.getElementById("advanceDays").value = s.advanceDays || 0;
document.getElementById("advanceEnabled").value = (s.advanceEnabled ?? false).toString();

document.getElementById("settingsModal").style.display = "block";

});

}


// SAVE SETTINGS
function saveSettings(){

let monthlyLimit = Number(document.getElementById("monthlyLimit").value)
let probationLimit = Number(document.getElementById("probationLimit").value)
let advanceDays = Number(document.getElementById("advanceDays").value)

if(monthlyLimit < 0 || advanceDays < 0){
alert("Values cannot be negative")
return
}

let settings = {

monthlyLimit: monthlyLimit,
monthlyEnabled: document.getElementById("monthlyEnabled").value === "true",

carryForward: document.getElementById("carryForward").value === "true",
carryRemaining: document.getElementById("carryRemaining").value === "true",
carryForwardMax: Number(document.getElementById("carryForwardMax").value) || 0,
carryType: document.getElementById("carryType").value,

after1YearOnly: document.getElementById("after1YearOnly").value === "true",
after1YearDays: Number(document.getElementById("after1YearDays").value) || 0,

advanceDays: advanceDays,
advanceEnabled: document.getElementById("advanceEnabled").value === "true",
probationLimit: probationLimit   // ✅ NEW

};

db.collection("leave_types").doc(currentLeaveId).update({
settings: settings
})
.then(()=>{
alert("✅ Settings saved");
closeSettings();
});

}


// CLOSE
function closeSettings(){
document.getElementById("settingsModal").style.display="none";
}
</script>

</body>
</html>

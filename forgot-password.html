<!DOCTYPE html>
<html>

<head>
<title>Forgot Password - Leave Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:380px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2d7ef7;
color:white;
border:none;
cursor:pointer;
font-size:16px;
border-radius:5px;
}

button:hover{
background:#1b5edb;
}

.msg{
margin-top:10px;
font-size:14px;
}

.back{
display:block;
margin-top:15px;
color:#2d7ef7;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<input type="email" id="email" placeholder="Enter your email">

<button onclick="resetPassword()">Send Reset Link</button>

<p class="msg" id="msg"></p>

<a class="back" href="login.html">Back to Login</a>

</div>


<!-- FIREBASE (same as login page) -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

function resetPassword(){

const email = document.getElementById("email").value
const msg = document.getElementById("msg")

if(!email){
    msg.style.color = "red"
    msg.innerText = "Please enter your email"
    return
}

firebase.auth().sendPasswordResetEmail(email)

.then(()=>{
    msg.style.color = "green"
    msg.innerText = "Reset link sent! Check your email."
})

.catch(error=>{
    msg.style.color = "red"
    msg.innerText = error.message
})

}

</script>

</body>

</html>

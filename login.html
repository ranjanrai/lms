<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Leave Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#2d7ef7,#00c6ff);
display:flex;
align-items:center;
justify-content:center;
}

/* Container */

.container{
width:100%;
max-width:420px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Title */

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#2d7ef7;
outline:none;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2d7ef7;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b5edb;
}

/* Register link */

.register{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#2d7ef7;
font-size:14px;
}

.register:hover{
text-decoration:underline;
}

/* Mobile */

@media (max-width:500px){

.container{
margin:20px;
padding:25px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<a class="register" href="index.html">
Create New Account
</a>

</div>


<!-- Firebase Libraries -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

</body>

</html>

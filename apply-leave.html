<!DOCTYPE html>

<html lang="en">
<head>

<title>Apply Leave</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN CSS -->

<link rel="stylesheet" href="css/style.css">

<!-- ICONS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Employee Panel</h2>

<a href="employee-dashboard.html" class="menu">
<i class="fas fa-home"></i> <span>Dashboard</span>
</a>

<a href="apply-leave.html" class="menu active">
<i class="fas fa-paper-plane"></i> <span>Apply Leave</span>
</a>

<a href="leave-history.html" class="menu">
<i class="fas fa-history"></i> <span>Leave History</span>
</a>

<a href="#" class="menu" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> <span>Logout</span>
</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">
<button onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>
<h2>Apply Leave</h2>
</div>

<div id="probationWarning" style="
display:none;
margin-bottom:15px;
padding:10px;
border-radius:6px;
background:#fff3cd;
color:#856404;
font-weight:bold;">
⚠ You are on probation. Leave restrictions apply.
</div>

<!-- FORM CARD -->

<div class="card fade-in" style="max-width:600px;">

<form id="leaveForm">

<div class="form-group">
<label>Leave Type</label>
<select id="leaveType"></select>
</div>

<div class="form-row">
<div class="form-group">
<label>Start Date</label>
<input type="date" id="startDate">
</div>

<div class="form-group">
<label>End Date</label>
<input type="date" id="endDate">
</div>
</div>


<!-- ✅ Department (BEFORE Reason) -->
<div class="form-group">
<label>Department</label>
<input type="text" id="department" placeholder="Enter your department">
</div>

<!-- Reason -->
<div class="form-group">
<label>Reason</label>
<textarea id="reason" placeholder="Enter reason"></textarea>
</div>

<!-- ✅ Class Adjustment (AFTER Reason) -->
<div class="form-group">
<label>Class Adjustment Details</label>
<textarea id="adjustment" placeholder="Enter class adjustment details (if any)"></textarea>
</div>

<button type="button" onclick="applyLeave()" class="btn-primary" id="submitBtn">
    <span id="btnText">Submit Leave Request</span>
    <span id="btnLoader" style="display:none;">
        <i class="fas fa-spinner fa-spin"></i> Submitting...
    </span>
</button>

</form>

</div>
<div class="card fade-in" style="max-width:600px; margin-top:20px;">

<h3>📅 Holidays</h3>

<ul id="holidayList" class="holiday-list"></ul>

</div>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/leave.js"></script>

<script>

// SIDEBAR TOGGLE (MATCH SYSTEM)
function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

if(window.innerWidth <= 768){
sidebar.classList.toggle("active")
}else{
sidebar.classList.toggle("collapsed")
}

}

</script>

</body>
</html>
